<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Face gradients -->
    <linearGradient id="gTop" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3d3d3d"/>
      <stop offset="100%" stop-color="#2e2e2e"/>
    </linearGradient>
    <linearGradient id="gLeft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#282828"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="gRight" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#242424"/>
      <stop offset="100%" stop-color="#151515"/>
    </linearGradient>

    <!-- Flip card gradients (left face) -->
    <linearGradient id="lcT" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2f2f2f"/>
      <stop offset="100%" stop-color="#272727"/>
    </linearGradient>
    <linearGradient id="lcB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#222222"/>
      <stop offset="100%" stop-color="#1b1b1b"/>
    </linearGradient>

    <!-- Flip card gradients (right face) -->
    <linearGradient id="rcT" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#232323"/>
    </linearGradient>
    <linearGradient id="rcB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e1e"/>
      <stop offset="100%" stop-color="#171717"/>
    </linearGradient>

    <!-- Drop shadow (slightly tighter for larger cube) -->
    <filter id="shadow" x="-20%" y="-8%" width="140%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" result="blur"/>
      <feOffset in="blur" dx="0" dy="10" result="off"/>
      <feFlood flood-color="#000" flood-opacity="0.45" result="color"/>
      <feComposite in="color" in2="off" operator="in" result="sh"/>
      <feMerge>
        <feMergeNode in="sh"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!--
      CUBE GEOMETRY (scaled ~1.18x):
        halfW=200  topH=118  sideH=236
        Top: (256,16)  Left: (56,134)  Right: (456,134)
        Center: (256,252)  BotL: (56,370)  BotR: (456,370)  Bottom: (256,488)

      LOCAL COORDS: each face is 200×236
      LEFT FACE:  matrix(1, 0.59, 0, 1, 56, 134)
      RIGHT FACE: matrix(1, -0.59, 0, 1, 256, 252)
    -->

    <!-- Clip paths for flip card split — match card panels (200×236 local) -->
    <clipPath id="cardTopClip">
      <rect x="9" y="9" width="182" height="104" rx="7" ry="7"/>
    </clipPath>
    <clipPath id="cardBotClip">
      <rect x="9" y="123" width="182" height="104" rx="7" ry="7"/>
    </clipPath>
  </defs>

  <g filter="url(#shadow)">

    <!-- ════════ TOP FACE ════════ -->
    <polygon points="256,16 456,134 256,252 56,134" fill="url(#gTop)"/>
    <line x1="56" y1="134" x2="256" y2="16" stroke="#505050" stroke-width="0.7" opacity="0.45"/>
    <line x1="256" y1="16" x2="456" y2="134" stroke="#484848" stroke-width="0.7" opacity="0.45"/>

    <!-- Clock icon centered on top face (256, 134) -->
    <g transform="translate(256,134) scale(1,0.59)">
      <circle cx="0" cy="0" r="115" fill="none" stroke="#888" stroke-width="3" opacity="0.75"/>
      <line x1="0" y1="0" x2="0" y2="-60" stroke="#aaa" stroke-width="4.5" stroke-linecap="round" opacity="0.85"/>
      <line x1="0" y1="0" x2="43" y2="-43" stroke="#aaa" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
      <circle cx="0" cy="0" r="6.5" fill="#aaa" opacity="0.85"/>
      <circle cx="0" cy="-102" r="4" fill="#666" opacity="0.7"/>
      <circle cx="102" cy="0" r="4" fill="#666" opacity="0.7"/>
      <circle cx="0" cy="102" r="4" fill="#666" opacity="0.7"/>
      <circle cx="-102" cy="0" r="4" fill="#666" opacity="0.7"/>
      <circle cx="51" cy="-88" r="2.4" fill="#555" opacity="0.5"/>
      <circle cx="88" cy="-51" r="2.4" fill="#555" opacity="0.5"/>
      <circle cx="88" cy="51" r="2.4" fill="#555" opacity="0.5"/>
      <circle cx="51" cy="88" r="2.4" fill="#555" opacity="0.5"/>
      <circle cx="-51" cy="88" r="2.4" fill="#555" opacity="0.5"/>
      <circle cx="-88" cy="51" r="2.4" fill="#555" opacity="0.5"/>
      <circle cx="-88" cy="-51" r="2.4" fill="#555" opacity="0.5"/>
      <circle cx="-51" cy="-88" r="2.4" fill="#555" opacity="0.5"/>
    </g>

    <!-- ════════ LEFT FACE ════════ -->
    <polygon points="56,134 256,252 256,488 56,370" fill="url(#gLeft)"/>

    <!-- Left face content in 200×236 local coords -->
    <g transform="matrix(1, 0.59, 0, 1, 56, 134)">
      <!-- Top card panel -->
      <rect x="9" y="9" width="182" height="104" rx="7" ry="7" fill="url(#lcT)"/>
      <!-- Bottom card panel -->
      <rect x="9" y="123" width="182" height="104" rx="7" ry="7" fill="url(#lcB)"/>

      <!-- Top half of "25" — clipped to top card -->
      <g clip-path="url(#cardTopClip)">
        <text x="100" y="118"
              text-anchor="middle"
              dominant-baseline="central"
              font-family="Oswald, sans-serif"
              font-weight="700"
              font-size="128"
              fill="#c0c0c0"
              letter-spacing="-3">25</text>
      </g>

      <!-- Bottom half of "25" — clipped to bottom card -->
      <g clip-path="url(#cardBotClip)">
        <text x="100" y="118"
              text-anchor="middle"
              dominant-baseline="central"
              font-family="Oswald, sans-serif"
              font-weight="700"
              font-size="128"
              fill="#a0a0a0"
              letter-spacing="-3">25</text>
      </g>

      <!-- Hinge — constrained to card width -->
      <line x1="9" y1="118" x2="191" y2="118" stroke="#080808" stroke-width="3.5"/>
      <line x1="9" y1="116" x2="191" y2="116" stroke="#3a3a3a" stroke-width="0.6" opacity="0.25"/>
    </g>

    <!-- ════════ RIGHT FACE ════════ -->
    <polygon points="256,252 456,134 456,370 256,488" fill="url(#gRight)"/>

    <!-- Right face content in 200×236 local coords -->
    <g transform="matrix(1, -0.59, 0, 1, 256, 252)">
      <!-- Top card panel -->
      <rect x="9" y="9" width="182" height="104" rx="7" ry="7" fill="url(#rcT)"/>
      <!-- Bottom card panel -->
      <rect x="9" y="123" width="182" height="104" rx="7" ry="7" fill="url(#rcB)"/>

      <!-- Top half of "5" — clipped to top card -->
      <g clip-path="url(#cardTopClip)">
        <text x="100" y="118"
              text-anchor="middle"
              dominant-baseline="central"
              font-family="Oswald, sans-serif"
              font-weight="700"
              font-size="140"
              fill="#c0c0c0">5</text>
      </g>

      <!-- Bottom half of "5" — clipped to bottom card -->
      <g clip-path="url(#cardBotClip)">
        <text x="100" y="118"
              text-anchor="middle"
              dominant-baseline="central"
              font-family="Oswald, sans-serif"
              font-weight="700"
              font-size="140"
              fill="#a0a0a0">5</text>
      </g>

      <!-- Hinge — constrained to card width -->
      <line x1="9" y1="118" x2="191" y2="118" stroke="#080808" stroke-width="3.5"/>
      <line x1="9" y1="116" x2="191" y2="116" stroke="#3a3a3a" stroke-width="0.6" opacity="0.25"/>
    </g>

    <!-- ════════ EDGE LINES ════════ -->
    <line x1="256" y1="252" x2="256" y2="488" stroke="#0e0e0e" stroke-width="1.2"/>
    <line x1="56" y1="134" x2="56" y2="370" stroke="#353535" stroke-width="0.6" opacity="0.35"/>
    <line x1="456" y1="134" x2="456" y2="370" stroke="#1e1e1e" stroke-width="0.6" opacity="0.3"/>
    <line x1="56" y1="370" x2="256" y2="488" stroke="#0c0c0c" stroke-width="1" opacity="0.5"/>
    <line x1="256" y1="488" x2="456" y2="370" stroke="#0c0c0c" stroke-width="1" opacity="0.5"/>

  </g>
</svg>