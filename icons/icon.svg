  <rect x="24" y="248" width="220" height="0" fill="#2b2b2b"/>
  <!-- Left card bottom -->
  <rect x="24" y="252" width="220" height="236" rx="28" ry="28" fill="#242424"/>
  <rect x="24" y="252" width="220" height="0" fill="#242424"/>
  <!-- Right card top -->
