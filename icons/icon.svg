  <rect x="268" y="246" width="220" height="4" fill="#000"/>
  <!-- Digits - tall, filling the card height -->
  <text x="134" y="410" text-anchor="middle" font-family="Oswald, Arial, sans-serif" font-size="420" font-weight="700" fill="#aaa">0</text>
  <text x="378" y="410" text-anchor="middle" font-family="Oswald, Arial, sans-serif" font-size="420" font-weight="700" fill="#aaa">0</text>
