<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<p>Right-click each image below and "Save image as" to the icons/ folder:</p>
<h3>icon-192.png</h3>
<canvas id="c192" width="192" height="192"></canvas>
<h3>icon-512.png</h3>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');

  // Background
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, s, s);

  const pad = s * 0.047;
  const gap = s * 0.047;
  const cw = (s - pad * 2 - gap) / 2;
  const ch = s - pad * 2;
  const cr = s * 0.055;
  const midY = pad + ch / 2;

  // Left card
  ctx.fillStyle = '#2b2b2b';
  ctx.beginPath();
  ctx.roundRect(pad, pad, cw, ch, cr);
  ctx.fill();
  ctx.fillStyle = '#242424';
  ctx.beginPath();
  ctx.roundRect(pad, midY, cw, ch / 2, [0, 0, cr, cr]);
  ctx.fill();

  // Right card
  ctx.fillStyle = '#2b2b2b';
  ctx.beginPath();
  ctx.roundRect(pad + cw + gap, pad, cw, ch, cr);
  ctx.fill();
  ctx.fillStyle = '#242424';
  ctx.beginPath();
  ctx.roundRect(pad + cw + gap, midY, cw, ch / 2, [0, 0, cr, cr]);
  ctx.fill();

  // Divider lines
  ctx.strokeStyle = '#000';
  ctx.lineWidth = s * 0.006;
  ctx.beginPath();
  ctx.moveTo(pad, midY);
  ctx.lineTo(pad + cw, midY);
  ctx.moveTo(pad + cw + gap, midY);
  ctx.lineTo(pad + cw + gap + cw, midY);
  ctx.stroke();

  // Digits
  ctx.fillStyle = '#aaa';
  ctx.font = `700 ${s * 0.82}px Oswald, Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText('0', pad + cw / 2, s * 0.8);
  ctx.fillText('0', pad + cw + gap + cw / 2, s * 0.8);
}

drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));

[192, 512].forEach(size => {
  const canvas = document.getElementById('c' + size);
  const img = new Image();
  img.src = canvas.toDataURL('image/png');
  canvas.parentNode.insertBefore(img, canvas.nextSibling);
});
</script>
</body>
</html>
